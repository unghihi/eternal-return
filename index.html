<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이터널 리턴 누적/평균 스코어보드</title>
  <style>
    /* 전체 기본 스타일 (Dark Mode) */
    *, *::before, *::after { box-sizing: border-box; }
    body { background-color: #0b0e14; color: #ffffff; font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif; margin: 0; padding: 0; }
    header { background-color: #111622; padding: 20px 40px; border-bottom: 1px solid #1f283d; display: flex; justify-content: space-between; align-items: center; }
    header h1 { margin: 0; font-size: 20px; font-weight: 700; letter-spacing: -0.5px; color: #f1f2f4; }
    
    .container { max-width: 950px; margin: 40px auto; padding: 0 20px; }
    
    /* 탭 메뉴 스타일 */
    .tab-menu { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 2px solid #1f283d; padding-bottom: 8px; }
    .tab-btn { background: none; border: none; color: #727888; padding: 10px 20px; font-size: 15px; font-weight: bold; cursor: pointer; border-radius: 4px; transition: all 0.2s; }
    .tab-btn:hover { color: #ffffff; background-color: #171f31; }
    .tab-btn.active { color: #ffffff; background-color: #222d44; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    
    /* 업로드 섹션 스타일 */
    .upload-container { background-color: #111622; border: 1px solid #1f283d; border-radius: 8px; padding: 30px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .form-group label { font-size: 14px; font-weight: bold; color: #9aa0a6; }
    .file-row { display: flex; align-items: center; gap: 12px; }
    .file-status { font-size: 14px; color: #727888; }
    .file-input-btn { background-color: #222d44; color: #ffffff; padding: 10px 20px; font-size: 14px; font-weight: bold; border: 1px solid #2d3b58; border-radius: 4px; cursor: pointer; transition: background-color 0.2s; }
    .file-input-btn:hover { background-color: #2d3b58; }
    #csv-file { display: none; }

    /* 스코어보드 헤더 */
    .board-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 0 8px; }
    .board-info { font-size: 13px; color: #727888; font-weight: 500; }

    /* 이미지 규격 기반 스코어보드 테이블 스타일 */
    .score-table { width: 100%; border-collapse: collapse; text-align: left; background-color: #111622; font-size: 14px; border-radius: 6px; overflow: hidden; }
    .score-table th { padding: 14px 16px; color: #727888; font-weight: bold; border-bottom: 1px solid #1f283d; font-size: 13px; }
    .score-table td { padding: 14px 16px; border-bottom: 1px solid #151b2a; color: #ffffff; vertical-align: middle; }
    .score-table tr:last-child td { border-bottom: none; }
    .score-table tr:hover td { background-color: #171f31; }
    
    /* 열 정렬 및 컴포넌트 규격 */
    .text-center { text-align: center; }
    .text-right { text-align: right; }
    .rank-col { font-weight: 800; width: 60px; color: #ffffff; }
    .name-col { font-weight: bold; }
    
    /* 탈출 카운터 조작기 스타일 */
    .escape-control { display: flex; align-items: center; justify-content: center; gap: 6px; }
    .escape-btn { background-color: #1f283d; color: #ffffff; border: 1px solid #2d3b58; border-radius: 3px; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; font-weight: bold; user-select: none; }
    .escape-btn:hover { background-color: #2d3b58; }
    .escape-val { min-width: 20px; font-weight: bold; text-align: center; font-size: 13px; }
    
    /* 점수 및 평균 점수 지표 디자인 */
    .score-total { font-weight: bold; font-size: 14px; color: #ffffff; width: 100px; }
    .score-avg { font-weight: bold; font-size: 14px; color: #ffbc42; width: 110px; } 
  </style>
</head>
<body>

  <header>
    <h1>이터널 리턴 대회 스코어 연산 시스템</h1>
  </header>

  <div class="container">
    <div class="tab-menu">
      <button class="tab-btn active" onclick="switchTab('view')">순위 및 평균 계산기</button>
      <button class="tab-btn" onclick="switchTab('upload')">데이터 업로드 (CSV/TXT)</button>
    </div>

    <div id="panel-view" class="tab-panel active">
      <div class="board-header">
        <div class="board-info" id="board-summary-text">누적 순위 · 총 0판 · 탈출 +3점/회</div>
      </div>

      <table class="score-table">
        <thead>
          <tr>
            <th class="text-center" style="width: 60px;">순위</th>
            <th>닉네임</th>
            <th class="text-center" style="width: 80px;">판수</th>
            <th class="text-center" style="width: 120px;">탈출</th>
            <th class="text-right" style="width: 100px;">점수</th>
            <th class="text-right" style="width: 120px; color: #ffbc42;">평균 점수</th>
          </tr>
        </thead>
        <tbody id="score-tbody">
          <tr>
            <td colspan="6" style="text-align: center; color: #727888; padding: 40px 0;">
              오른쪽 상단 '데이터 업로드' 탭에서 전적 파일을 선택해 주세요.
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div id="panel-upload" class="tab-panel">
      <div class="upload-container">
        <div class="form-group">
          <label>대회 결과 파일(.csv / .txt) 선택</label>
          <div class="file-row">
            <button class="file-input-btn" onclick="document.getElementById('csv-file').click()">파일 찾기</button>
            <span id="file-name-status" class="file-status">선택된 파일 없음</span>
            <input type="file" id="csv-file" accept=".csv, .txt" onchange="handleFileSelect(this)">
          </div>
        </div>
        <div style="color: #727888; font-size: 13px; line-height: 1.6;">
          ※ 파일 데이터 정렬 규격:<br>
          첫 줄은 컬럼명이며 두 번째 줄부터 <strong>[닉네임, 판수, 탈출 횟수, 기본 점수]</strong> 순서대로 컴마(,) 구분되어 있어야 파싱됩니다.
        </div>
      </div>
    </div>
  </div>

  <script>
    let playersData = []; 

    function switchTab(tabId) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
      
      if(tabId === 'view') {
        document.querySelectorAll('.tab-btn')[0].classList.add('active');
        document.getElementById('panel-view').classList.add('active');
        renderScoreboard();
      } else {
        document.querySelectorAll('.tab-btn')[1].classList.add('active');
        document.getElementById('panel-upload').classList.add('active');
      }
    }

    function handleFileSelect(input) {
      const file = input.files[0];
      if (!file) return;

      document.getElementById('file-name-status').innerText = file.name + " (로드 완료)";
      document.getElementById('file-name-status').style.color = "#385ec2";

      const reader = new FileReader();
      reader.onload = function(e) {
        parseInputData(e.target.result);
      };
      reader.readAsText(file, 'utf-8');
    }

    function parseInputData(text) {
      const lines = text.split(/\r?\n/);
      const list = [];

      for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;

        const cols = line.split(',');
        if (cols.length < 4) continue;

        const nickname = cols[0].trim();
        const matches = parseInt(cols[1].trim()) || 0;
        const escapes = parseInt(cols[2].trim()) || 0;
        const rawScore = parseFloat(cols[3].trim()) || 0;

        if (!nickname || nickname === "닉네임") continue;

        list.push({
          nickname: nickname,
          matchCount: matches,
          escapeCount: escapes,
          baseScore: rawScore 
        });
      }

      playersData = list;
      switchTab('view'); 
    }

    function updateEscape(index, delta) {
      if (!playersData[index]) return;
      
      let currentEscapes = playersData[index].escapeCount;
      currentEscapes += delta;
      
      if (currentEscapes < 0) currentEscapes = 0; 
      
      playersData[index].escapeCount = currentEscapes;
      renderScoreboard(); 
    }

    function renderScoreboard() {
      const tbody = document.getElementById('score-tbody');
      if (!tbody) return;

      if (playersData.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: #727888; padding: 40px 0;">데이터가 비어 있습니다. 파일을 업로드해 주세요.</td></tr>`;
        return;
      }

      const calculatedList = playersData.map((p, idx) => {
        const finalTotalScore = p.baseScore + (p.escapeCount * 3);
        const averageScore = p.matchCount > 0 ? (finalTotalScore / p.matchCount) : 0;

        return {
          originalIndex: idx,
          nickname: p.nickname,
          matchCount: p.matchCount,
          escapeCount: p.escapeCount,
          totalScore: finalTotalScore,
          averageScore: averageScore
        };
      });

      // 평균 점수 기준 내림차순 정렬 규칙 적용
      calculatedList.sort((a, b) => b.averageScore - a.averageScore);

      const totalMatchesArray = playersData.map(p => p.matchCount);
      const maxMatchCount = totalMatchesArray.length > 0 ? Math.max(...totalMatchesArray) : 0;
      document.getElementById('board-summary-text').innerText = `누적 순위 · 총 ${maxMatchCount}판 기준 연산 · 탈출 +3점/회`;

      tbody.innerHTML = '';
      calculatedList.forEach((p, idx) => {
        const rank = idx + 1;
        const row = document.createElement('tr');

        row.innerHTML = `
          <td class="text-center rank-col">${rank}</td>
          <td class="name-col">${p.nickname}</td>
          <td class="text-center">${p.matchCount}</td>
          <td class="text-center">
            <div class="escape-control">
              <div class="escape-btn" onclick="updateEscape(${p.originalIndex}, -1)">-</div>
              <div class="escape-val">${p.escapeCount}</div>
              <div class="escape-btn" onclick="updateEscape(${p.originalIndex}, 1)">+</div>
            </div>
          </td>
          <td class="text-right score-total">${p.totalScore.toFixed(1)}</td>
          <td class="text-right score-avg">${p.averageScore.toFixed(2)}</td>
        `;
        tbody.appendChild(row);
      });
    }
  </script>
</body>
</html>
